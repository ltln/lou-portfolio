<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">LOUIS NGUYEN Cherry Blossom theme banner</title>
  <desc id="desc">A soft spring pink banner with falling cherry petals and centered LOUIS NGUYEN text.</desc>
  <defs><clipPath id="clip"><rect width="1280" height="640" rx="36" ry="36"/></clipPath><radialGradient id="pink" cx="80%" cy="16%" r="58%"><stop offset="0" stop-color="rgb(190,93,145)" stop-opacity=".16"/><stop offset="1" stop-color="rgb(252,244,248)" stop-opacity="0"/></radialGradient><radialGradient id="green" cx="12%" cy="84%" r="48%"><stop offset="0" stop-color="rgb(104,145,116)" stop-opacity=".10"/><stop offset="1" stop-color="rgb(252,244,248)" stop-opacity="0"/></radialGradient><pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse"><circle cx="1" cy="1" r="1" fill="rgb(38,29,38)" fill-opacity=".18"/></pattern><filter id="glow" x="-20%" y="-70%" width="140%" height="240%"><feGaussianBlur in="SourceAlpha" stdDeviation="5" result="b"/><feFlood flood-color="rgb(190,93,145)" flood-opacity=".24"/><feComposite in2="b" operator="in" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter><style>.name{font-family:Consolas,monospace;font-size:76px;font-weight:700;letter-spacing:8px;fill:rgb(38,29,38);text-anchor:middle;dominant-baseline:middle}.sub{font-family:Consolas,monospace;font-size:14px;letter-spacing:5px;fill:rgb(190,93,145);fill-opacity:.76;text-anchor:middle;dominant-baseline:middle}.pulse{animation:p 3.8s ease-in-out infinite}.petal{fill:var(--c);opacity:var(--o);filter:drop-shadow(0 0 7px rgb(190 93 145 / .14))}@keyframes p{0%,100%{opacity:.86}50%{opacity:1}}</style></defs>
  <g clip-path="url(#clip)"><rect width="1280" height="640" fill="rgb(252,244,248)"/><rect width="1280" height="640" fill="url(#pink)"/><rect width="1280" height="640" fill="url(#green)"/><rect width="1280" height="640" fill="url(#dots)" opacity=".34"/><rect x="70" y="62" width="1140" height="516" rx="28" fill="none" stroke="rgb(214,185,204)" stroke-opacity=".72"/><rect x="86" y="78" width="1108" height="484" rx="20" fill="none" stroke="rgb(190,93,145)" stroke-opacity=".16"/>
    <g aria-hidden="true"><g><animateTransform attributeName="transform" type="translate" values="70 -80;20 725" dur="24s" repeatCount="indefinite"/><path class="petal" style="--c:rgb(255,190,209);--o:.58" d="M0 19c0-8 9-11 15-19 7-8 17-10 23-5 5 4 0 11 1 17 1 5 6 8 1 13-7 7-24 9-40-6Z"><animateTransform attributeName="transform" type="rotate" values="0;360" dur="18s" repeatCount="indefinite"/></path></g><g><animateTransform attributeName="transform" type="translate" values="360 -120;420 724" dur="31s" begin="-9s" repeatCount="indefinite"/><path class="petal" style="--c:rgb(255,213,224);--o:.62" d="M0 19c0-8 9-11 15-19 7-8 17-10 23-5 5 4 0 11 1 17 1 5 6 8 1 13-7 7-24 9-40-6Z"><animateTransform attributeName="transform" type="rotate" values="0;-360" dur="22s" repeatCount="indefinite"/></path></g><g><animateTransform attributeName="transform" type="translate" values="720 -90;660 730" dur="27s" begin="-16s" repeatCount="indefinite"/><path class="petal" style="--c:rgb(248,157,183);--o:.52" d="M0 19c0-8 9-11 15-19 7-8 17-10 23-5 5 4 0 11 1 17 1 5 6 8 1 13-7 7-24 9-40-6Z"><animateTransform attributeName="transform" type="rotate" values="0;360" dur="20s" repeatCount="indefinite"/></path></g><g><animateTransform attributeName="transform" type="translate" values="1060 -70;1125 725" dur="29s" begin="-5s" repeatCount="indefinite"/><path class="petal" style="--c:rgb(255,190,209);--o:.56" d="M0 19c0-8 9-11 15-19 7-8 17-10 23-5 5 4 0 11 1 17 1 5 6 8 1 13-7 7-24 9-40-6Z"><animateTransform attributeName="transform" type="rotate" values="0;-360" dur="21s" repeatCount="indefinite"/></path></g></g>
    <g class="pulse" filter="url(#glow)"><text class="name" x="640" y="315">LOUIS NGUYEN</text></g><text class="sub" x="640" y="384">CHERRY BLOSSOM</text></g>
</svg>
