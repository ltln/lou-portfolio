<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">LOUIS NGUYEN Aurora Field theme banner</title>
  <desc id="desc">A polar navy aurora banner with snow, green-violet light, and centered LOUIS NGUYEN text.</desc>
  <defs><clipPath id="clip"><rect width="1280" height="640" rx="36" ry="36"/></clipPath><linearGradient id="aur" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="rgb(111,232,184)" stop-opacity="0"/><stop offset=".34" stop-color="rgb(111,232,184)" stop-opacity=".22"/><stop offset=".54" stop-color="rgb(164,133,255)" stop-opacity=".18"/><stop offset="1" stop-color="rgb(7,14,30)" stop-opacity="0"/></linearGradient><radialGradient id="ice" cx="82%" cy="18%" r="48%"><stop offset="0" stop-color="rgb(164,133,255)" stop-opacity=".16"/><stop offset="1" stop-color="rgb(7,14,30)" stop-opacity="0"/></radialGradient><pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse"><circle cx="1" cy="1" r="1" fill="rgb(232,246,255)" fill-opacity=".18"/></pattern><filter id="glow" x="-20%" y="-70%" width="140%" height="240%"><feGaussianBlur in="SourceAlpha" stdDeviation="5" result="b"/><feFlood flood-color="rgb(111,232,184)" flood-opacity=".30"/><feComposite in2="b" operator="in" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter><style>.name{font-family:Consolas,monospace;font-size:76px;font-weight:700;letter-spacing:8px;fill:rgb(232,246,255);text-anchor:middle;dominant-baseline:middle}.sub{font-family:Consolas,monospace;font-size:14px;letter-spacing:5px;fill:rgb(111,232,184);fill-opacity:.82;text-anchor:middle;dominant-baseline:middle}.pulse{animation:p 3.8s ease-in-out infinite}.snow{fill:rgb(232,246,255);opacity:var(--o)}@keyframes p{0%,100%{opacity:.86}50%{opacity:1}}</style></defs>
  <g clip-path="url(#clip)"><rect width="1280" height="640" fill="rgb(7,14,30)"/><rect width="1280" height="640" fill="url(#aur)"><animate attributeName="opacity" values=".65;1;.65" dur="8s" repeatCount="indefinite"/></rect><rect width="1280" height="640" fill="url(#ice)"/><rect width="1280" height="640" fill="url(#dots)" opacity=".22"/><rect x="70" y="62" width="1140" height="516" rx="28" fill="none" stroke="rgb(38,72,96)" stroke-opacity=".5"/><rect x="86" y="78" width="1108" height="484" rx="20" fill="none" stroke="rgb(111,232,184)" stroke-opacity=".14"/>
    <g aria-hidden="true"><g><animateTransform attributeName="transform" type="translate" values="0 -70;35 720" dur="36s" repeatCount="indefinite"/><circle class="snow" style="--o:.36" cx="160" cy="0" r="2"/><circle class="snow" style="--o:.28" cx="420" cy="-180" r="1.7"/><circle class="snow" style="--o:.42" cx="760" cy="-70" r="2.2"/><circle class="snow" style="--o:.30" cx="1060" cy="-230" r="1.8"/></g></g>
    <g class="pulse" filter="url(#glow)"><text class="name" x="640" y="315">LOUIS NGUYEN</text></g><text class="sub" x="640" y="384">AURORA FIELD</text></g>
</svg>
