<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">LOUIS NGUYEN Halloween theme banner</title>
  <desc id="desc">A muted pumpkin and violet Halloween banner with fog, tiny bats, and centered LOUIS NGUYEN text.</desc>
  <defs><clipPath id="clip"><rect width="1280" height="640" rx="36" ry="36"/></clipPath><radialGradient id="pumpkin" cx="16%" cy="84%" r="54%"><stop offset="0" stop-color="rgb(222,128,58)" stop-opacity=".18"/><stop offset="1" stop-color="rgb(17,15,21)" stop-opacity="0"/></radialGradient><radialGradient id="violet" cx="84%" cy="16%" r="56%"><stop offset="0" stop-color="rgb(167,117,224)" stop-opacity=".16"/><stop offset="1" stop-color="rgb(17,15,21)" stop-opacity="0"/></radialGradient><pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse"><circle cx="1" cy="1" r="1" fill="rgb(242,235,223)" fill-opacity=".16"/></pattern><filter id="glow" x="-20%" y="-70%" width="140%" height="240%"><feGaussianBlur in="SourceAlpha" stdDeviation="5" result="b"/><feFlood flood-color="rgb(222,128,58)" flood-opacity=".28"/><feComposite in2="b" operator="in" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter><style>.name{font-family:Consolas,monospace;font-size:76px;font-weight:700;letter-spacing:8px;fill:rgb(242,235,223);text-anchor:middle;dominant-baseline:middle}.sub{font-family:Consolas,monospace;font-size:14px;letter-spacing:5px;fill:rgb(222,128,58);fill-opacity:.82;text-anchor:middle;dominant-baseline:middle}.pulse{animation:p 3.6s ease-in-out infinite}.bat{fill:rgb(242,235,223);opacity:.18}@keyframes p{0%,100%{opacity:.84}50%{opacity:1}}</style></defs>
  <g clip-path="url(#clip)"><rect width="1280" height="640" fill="rgb(17,15,21)"/><rect width="1280" height="640" fill="url(#pumpkin)"/><rect width="1280" height="640" fill="url(#violet)"/><rect width="1280" height="640" fill="url(#dots)" opacity=".20"/><rect width="1280" height="640" fill="rgb(0,0,0)" opacity=".12"/><rect x="70" y="62" width="1140" height="516" rx="28" fill="none" stroke="rgb(78,62,84)" stroke-opacity=".58"/><rect x="86" y="78" width="1108" height="484" rx="20" fill="none" stroke="rgb(222,128,58)" stroke-opacity=".14"/>
    <g aria-hidden="true"><path d="M120 455c240-80 432 50 650-38 150-60 260-26 398 18" fill="none" stroke="rgb(167,117,224)" stroke-opacity=".12" stroke-width="58"><animate attributeName="stroke-opacity" values=".08;.16;.08" dur="7s" repeatCount="indefinite"/></path><path class="bat" d="M250 180c18-20 36-20 54 0 18-20 36-20 54 0-28-8-40 10-54 20-14-10-26-28-54-20Z"><animateTransform attributeName="transform" type="translate" values="0 0;22 8;0 0" dur="6s" repeatCount="indefinite"/></path><path class="bat" d="M922 214c14-16 28-16 42 0 14-16 28-16 42 0-22-6-31 8-42 16-11-8-20-22-42-16Z"><animateTransform attributeName="transform" type="translate" values="0 0;-18 9;0 0" dur="8s" repeatCount="indefinite"/></path><circle cx="210" cy="460" r="2" fill="rgb(222,128,58)" opacity=".46"/><circle cx="1030" cy="338" r="2" fill="rgb(167,117,224)" opacity=".42"/><circle cx="760" cy="180" r="1.8" fill="rgb(222,128,58)" opacity=".38"/></g>
    <g class="pulse" filter="url(#glow)"><text class="name" x="640" y="315">LOUIS NGUYEN</text></g><text class="sub" x="640" y="384">HALLOWEEN BUILD</text></g>
</svg>
